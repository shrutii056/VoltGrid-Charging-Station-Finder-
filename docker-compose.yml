version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: ev_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - ev_network

  backend:
    build: ./backend
    container_name: ev_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/ev_charger_db
      - JWT_SECRET=${JWT_SECRET:-change_this_secret_in_production}
      - JWT_EXPIRE=7d
      - NODE_ENV=production
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - mongo
    networks:
      - ev_network

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:5000/api
    container_name: ev_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - ev_network

networks:
  ev_network:
    driver: bridge

volumes:
  mongo_data:
